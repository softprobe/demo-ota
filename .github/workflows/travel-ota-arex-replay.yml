name: travel-ota-arex-replay

on:
  push:
    branches:
      - '**'
    paths:
      - 'airline-common/**'
      - 'travel-ota/**'
      - 'pom.xml'
      - 'scripts/arex-replay-ci.mjs'
      - '.github/workflows/travel-ota-arex-replay.yml'
  pull_request:
    paths:
      - 'airline-common/**'
      - 'travel-ota/**'
      - 'pom.xml'
      - 'scripts/arex-replay-ci.mjs'
      - '.github/workflows/travel-ota-arex-replay.yml'

permissions:
  contents: read

concurrency:
  group: travel-ota-arex-replay-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  replay:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      AREX_WEB_API_URL: https://api-onpremise-gcp.softprobe.ai
      AREX_SCHEDULE_URL: https://schedule-onpremise-gcp.softprobe.ai
      AREX_APP_ID: 504c5a6db168cdc4
      AREX_SOURCE_ENV: pro
      AREX_ENABLE_MOCK: 'true'
      TRAVEL_OTA_PORT: '19380'
      TRAVEL_OTA_LOCAL_URL: http://127.0.0.1:19380/
      SP_AIRLINE_URL: http://127.0.0.1:8081/airline-api/v1

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate AREX token secret
        run: |
          test -n "${{ secrets.AREX_ACCESS_TOKEN }}" || {
            echo "AREX_ACCESS_TOKEN secret is required."
            exit 1
          }
          test -n "${{ secrets.CLOUDFLARE_TUNNEL_TOKEN }}" || {
            echo "CLOUDFLARE_TUNNEL_TOKEN secret is required."
            exit 1
          }
          test -n "${{ vars.AREX_TARGET_ENV || secrets.AREX_TARGET_ENV }}" || {
            echo "AREX_TARGET_ENV repo variable or secret is required."
            exit 1
          }

      - name: Build Maven modules
        run: mvn -B -DskipTests install

      - name: Install cloudflared
        run: |
          sudo mkdir -p --mode=0755 /usr/share/keyrings
          curl -fsSL https://pkg.cloudflare.com/cloudflare-public-v2.gpg | sudo tee /usr/share/keyrings/cloudflare-public-v2.gpg >/dev/null
          echo 'deb [signed-by=/usr/share/keyrings/cloudflare-public-v2.gpg] https://pkg.cloudflare.com/cloudflared any main' | sudo tee /etc/apt/sources.list.d/cloudflared.list
          sudo apt-get update
          sudo apt-get install -y cloudflared

      - name: Download Softprobe agent
        run: |
          curl -fL -o travel-ota/sp-agent.jar https://storage.googleapis.com/softprobe-published-files/agent/longteng/v3.9.29-longteng/sp-agent-v3.9.29-longteng-jdk11.jar

      - name: Start sp-airline
        run: |
          chmod +x sp-airline/run.sh
          mkdir -p .artifacts
          nohup bash -lc 'cd sp-airline && ./run.sh' > .artifacts/sp-airline.stdout.log 2>&1 &
          echo $! > .artifacts/sp-airline.pid

      - name: Wait for sp-airline to be ready
        run: |
          for i in $(seq 1 120); do
            if curl -fsS "${SP_AIRLINE_URL}/health" > /dev/null; then
              echo "sp-airline is ready"
              exit 0
            fi
            sleep 2
          done
          echo "sp-airline did not become ready in time"
          echo "--- sp-airline stdout ---"
          tail -n 200 .artifacts/sp-airline.stdout.log || true
          exit 1

      - name: Start travel-ota
        run: |
          mkdir -p .artifacts
          nohup bash -lc 'cd travel-ota && java -javaagent:sp-agent.jar -Dsp.app.id=504c5a6db168cdc4 -Dsp.storage.service.host=https://storage-onpremise-gcp.softprobe.ai -Dserver.port='"${TRAVEL_OTA_PORT}"' -DAIRLINE_BASE_URL='"${SP_AIRLINE_URL}"' -jar target/travel-ota-1.0-SNAPSHOT.jar' > .artifacts/travel-ota.stdout.log 2>&1 &
          echo $! > .artifacts/travel-ota.pid

      - name: Wait for travel-ota to be ready
        run: |
          for i in $(seq 1 120); do
            if curl -fsS "${TRAVEL_OTA_LOCAL_URL}" > /dev/null; then
              echo "travel-ota is ready"
              exit 0
            fi
            sleep 2
          done
          echo "travel-ota did not become ready in time"
          echo "--- java processes ---"
          ps -ef | grep java | grep -v grep || true
          echo "--- port listeners ---"
          ss -ltnp || true
          echo "--- travel-ota stdout ---"
          tail -n 200 .artifacts/travel-ota.stdout.log || true
          echo "--- travel-ota logs ---"
          find travel-ota/logs -maxdepth 1 -type f -print -exec tail -n 100 {} \; || true
          exit 1

      - name: Start Cloudflare tunnel
        env:
          CLOUDFLARE_TUNNEL_TOKEN: ${{ secrets.CLOUDFLARE_TUNNEL_TOKEN }}
        run: |
          nohup cloudflared tunnel run --token "${CLOUDFLARE_TUNNEL_TOKEN}" > .artifacts/cloudflared.log 2>&1 &
          echo $! > .artifacts/cloudflared.pid
          sleep 10
          echo "--- cloudflared startup ---"
          tail -n 100 .artifacts/cloudflared.log || true

      - name: Wait for public tunnel URL
        env:
          AREX_TARGET_ENV: ${{ vars.AREX_TARGET_ENV || secrets.AREX_TARGET_ENV }}
        run: |
          for i in $(seq 1 60); do
            if curl -fsS "${AREX_TARGET_ENV}" > /dev/null; then
              echo "public tunnel is ready"
              exit 0
            fi
            sleep 2
          done
          echo "public tunnel did not become ready in time"
          echo "--- cloudflared log ---"
          tail -n 200 .artifacts/cloudflared.log || true
          exit 1

      - name: Replay captured sessions with AREX
        env:
          AREX_ACCESS_TOKEN: ${{ secrets.AREX_ACCESS_TOKEN }}
          AREX_TARGET_ENV: ${{ vars.AREX_TARGET_ENV || secrets.AREX_TARGET_ENV }}
        run: |
          BEGIN_TIME="$(date -u -d '7 days ago' +%Y-%m-%dT%H:%M:%SZ)"
          END_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          node scripts/arex-replay-ci.mjs \
            --web-api-url "${AREX_WEB_API_URL}" \
            --schedule-url "${AREX_SCHEDULE_URL}" \
            --app-id "${AREX_APP_ID}" \
            --target-env "${AREX_TARGET_ENV}" \
            --source-env "${AREX_SOURCE_ENV}" \
            --all-sessions \
            --begin-time "${BEGIN_TIME}" \
            --end-time "${END_TIME}" \
            --wait-for-url "${AREX_TARGET_ENV}" \
            --access-token "${AREX_ACCESS_TOKEN}" \
            --report-json .artifacts/arex-replay-summary.json

      - name: Upload replay artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: travel-ota-arex-artifacts
          path: |
            .artifacts/**
            travel-ota/logs/**
          if-no-files-found: warn

      - name: Stop travel-ota
        if: always()
        run: |
          if [ -f .artifacts/travel-ota.pid ]; then
            PID="$(cat .artifacts/travel-ota.pid)"
            if kill -0 "${PID}" 2>/dev/null; then
              kill "${PID}" || true
              sleep 5
              kill -9 "${PID}" 2>/dev/null || true
            fi
          fi
          if [ -f .artifacts/sp-airline.pid ]; then
            PID="$(cat .artifacts/sp-airline.pid)"
            if kill -0 "${PID}" 2>/dev/null; then
              kill "${PID}" || true
              sleep 5
              kill -9 "${PID}" 2>/dev/null || true
            fi
          fi
          if [ -f .artifacts/cloudflared.pid ]; then
            PID="$(cat .artifacts/cloudflared.pid)"
            if kill -0 "${PID}" 2>/dev/null; then
              kill "${PID}" || true
              sleep 5
              kill -9 "${PID}" 2>/dev/null || true
            fi
          fi
