name: travel-ota-arex-replay

on:
  push:
    branches:
      - '**'
    paths:
      - 'airline-common/**'
      - 'travel-ota/**'
      - 'pom.xml'
      - 'scripts/arex-replay-ci.mjs'
      - '.github/workflows/travel-ota-arex-replay.yml'
  pull_request:
    paths:
      - 'airline-common/**'
      - 'travel-ota/**'
      - 'pom.xml'
      - 'scripts/arex-replay-ci.mjs'
      - '.github/workflows/travel-ota-arex-replay.yml'

permissions:
  contents: read

concurrency:
  group: travel-ota-arex-replay-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  replay:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      AREX_WEB_API_URL: https://api-onpremise-gcp.softprobe.ai
      AREX_SCHEDULE_URL: https://schedule-onpremise-gcp.softprobe.ai
      AREX_TARGET_ENV: http://127.0.0.1:19380
      AREX_WAIT_FOR_URL: http://127.0.0.1:19380/
      AREX_APP_ID: 504c5a6db168cdc4
      AREX_SOURCE_ENV: pro
      AREX_ENABLE_MOCK: 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate AREX token secret
        run: |
          test -n "${{ secrets.AREX_ACCESS_TOKEN }}" || {
            echo "AREX_ACCESS_TOKEN secret is required."
            exit 1
          }

      - name: Build Maven modules
        run: mvn -B -DskipTests install

      - name: Start travel-ota
        run: |
          chmod +x travel-ota/run.sh
          mkdir -p .artifacts
          nohup bash -lc 'cd travel-ota && ./run.sh' > .artifacts/travel-ota.stdout.log 2>&1 &
          echo $! > .artifacts/travel-ota.pid

      - name: Wait for travel-ota to be ready
        run: |
          for i in $(seq 1 120); do
            if curl -fsS "${AREX_WAIT_FOR_URL}" > /dev/null; then
              echo "travel-ota is ready"
              exit 0
            fi
            sleep 2
          done
          echo "travel-ota did not become ready in time"
          exit 1

      - name: Replay captured sessions with AREX
        env:
          AREX_ACCESS_TOKEN: ${{ secrets.AREX_ACCESS_TOKEN }}
        run: |
          BEGIN_TIME="$(date -u -d '7 days ago' +%Y-%m-%dT%H:%M:%SZ)"
          END_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          node scripts/arex-replay-ci.mjs \
            --web-api-url "${AREX_WEB_API_URL}" \
            --schedule-url "${AREX_SCHEDULE_URL}" \
            --app-id "${AREX_APP_ID}" \
            --target-env "${AREX_TARGET_ENV}" \
            --source-env "${AREX_SOURCE_ENV}" \
            --all-sessions \
            --begin-time "${BEGIN_TIME}" \
            --end-time "${END_TIME}" \
            --wait-for-url "${AREX_WAIT_FOR_URL}" \
            --access-token "${AREX_ACCESS_TOKEN}" \
            --report-json .artifacts/arex-replay-summary.json

      - name: Upload replay artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: travel-ota-arex-artifacts
          path: |
            .artifacts/**
            travel-ota/logs/**
          if-no-files-found: warn

      - name: Stop travel-ota
        if: always()
        run: |
          if [ -f .artifacts/travel-ota.pid ]; then
            PID="$(cat .artifacts/travel-ota.pid)"
            if kill -0 "${PID}" 2>/dev/null; then
              kill "${PID}" || true
              sleep 5
              kill -9 "${PID}" 2>/dev/null || true
            fi
          fi
