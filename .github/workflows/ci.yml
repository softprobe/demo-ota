name: demo-ota CI

# AREX replay against api-onpremise-gcp.softprobe.ai is disabled (service retired).
# Re-enable by restoring scripts/arex-replay-ci.mjs integration when a target exists.

on:
  push:
    branches:
      - '**'
    paths:
      - 'travel-ota/**'
      - 'pom.xml'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - 'travel-ota/**'
      - 'pom.xml'
      - '.github/workflows/ci.yml'

permissions:
  contents: read

concurrency:
  group: demo-ota-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build Maven modules
        run: mvn -B -DskipTests install
