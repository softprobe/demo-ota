server:
  port: 8080
  servlet:
    context-path: /
  address: 0.0.0.0

spring:
  application:
    name: travel-ota
  
  # static resources
  web:
    resources:
      static-locations: classpath:/static/
  
  # Jackson settings
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    default-property-inclusion: NON_NULL

# logging
logging:
  level:
    org.example: DEBUG
    org.springframework.web: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# RegionTenantCodeConfig demo (@Value setter → static field → inner enum snapshot).
# Change tenant.sales-region (MEA=8% tax, EU=20% tax) at replay time to expose stale static/enum bugs.
tenant:
  MEA: tenant-mea-local
  EU: tenant-eu-local
  sales-region: MEA

# custom settings
app:
  # mock data
  mock:
    # flight search delay (ms)
    search-delay: 500
    # booking delay (ms)
    booking-delay: 1000
    # payment delay (ms)
    payment-delay: 1500
  
  # airline API config
  airline:
    # NDC mock airline worker (https://spair.softprobe.ai)
    base-url: ${AIRLINE_NDC_BASE_URL:https://spair.softprobe.ai/ndc/v21.3}
    # connection timeout (ms)
    connection-timeout: 5000
    # read timeout (ms)
    read-timeout: 10000