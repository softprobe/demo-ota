<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flight Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: #f8f9fa;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px 0;
        }
        
        .detail-container {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin: 20px 0;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .flight-detail {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .flight-route {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 20px 0;
        }
        
        .flight-time {
            text-align: center;
        }
        
        .flight-duration {
            text-align: center;
            color: #6c757d;
        }
        
        .flight-arrow {
            color: #667eea;
            font-size: 2em;
        }
        
        .fare-option {
            border: 2px solid #e9ecef;
            border-radius: 10px;
            padding: 20px;
            margin: 15px 0;
            transition: all 0.3s ease;
        }
        
        .fare-option:hover {
            border-color: #667eea;
        }
        
        .fare-option.recommended {
            border-color: #28a745;
            background: #f8fff9;
        }
        
        .btn-book {
            background: linear-gradient(45deg, #667eea, #764ba2);
            border: none;
            border-radius: 8px;
            color: white;
            padding: 12px 30px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .btn-book:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        
        .amenity-icon {
            width: 30px;
            height: 30px;
            background: #667eea;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            margin-right: 10px;
        }
        
        .baggage-info {
            display: flex;
            gap: 15px;
            margin-top: 15px;
        }
        
        .baggage-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.9em;
            color: #6c757d;
        }
        
        .fare-features {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .feature-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9em;
            color: #6c757d;
        }
        
        .feature-item i {
            width: 16px;
            color: #667eea;
        }
        
        .rating {
            color: #ffc107;
        }
        
        .price-highlight {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            margin-bottom: 20px;
        }
        
        .complete-trip {
            background: #fff3cd;
            border: 1px solid #ffeaa7;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <div class="container">
            <div class="row align-items-center">
                <div class="col-md-6">
                    <h4><i class="fas fa-plane"></i> Flight Details</h4>
                </div>
                <div class="col-md-6 text-end">
                    <a href="/list.html" class="btn btn-outline-light me-2">
                        <i class="fas fa-arrow-left"></i> Back to List
                    </a>
                    <a href="/" class="btn btn-outline-light">
                        <i class="fas fa-home"></i> Home
                    </a>
                </div>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="row">
            <!-- Left: Book Flight -->
            <div class="col-lg-8">
                <div class="detail-container">
                    <h5 class="mb-4">
                        <i class="fas fa-ticket-alt"></i> Book Flight
                    </h5>
                    
                    <!-- Read Booking Notice -->
                    <div class="alert alert-info">
                        <i class="fas fa-info-circle"></i>
                        <strong>Read Booking Notice</strong>
                        <button class="btn btn-sm btn-outline-info float-end">Expand</button>
                    </div>
                    
                    <!-- Must Include -->
                    <div class="mb-4">
                        <label class="form-label fw-bold">Must Include</label>
                        <div>
                            <button class="btn btn-outline-primary me-2">
                                <i class="fas fa-suitcase"></i> Carry-on Baggage
                            </button>
                            <button class="btn btn-outline-primary">
                                <i class="fas fa-suitcase-rolling"></i> Checked Baggage
                            </button>
                        </div>
                    </div>
                    
                    <!-- Flight Options -->
                    <div id="flightOptions">
                        <!-- Flight options will be dynamically generated by JavaScript -->
                    </div>
                </div>
            </div>
            
            <!-- Right: Flight Details and Complete Trip -->
            <div class="col-lg-4">
                <!-- Flight Details -->
                <div class="detail-container">
                    <h5 class="mb-4">
                        <i class="fas fa-info-circle"></i> Flight Details
                    </h5>
                    
                    <div class="flight-detail" id="flightDetail">
                        <!-- Flight details will be dynamically generated by JavaScript -->
                    </div>
                </div>
                
                <!-- Complete Trip -->
                <div class="detail-container">
                    <h5 class="mb-4">
                        <i class="fas fa-plus-circle"></i> Complete Trip
                    </h5>
                    
                    <div class="complete-trip">
                        <i class="fas fa-bell text-warning" style="font-size: 2em;"></i>
                        <div class="mt-2">
                            <strong>Add hotel, car rental and other services</strong>
                            <p class="text-muted mb-0">Make your trip more perfect</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/detail.js"></script>
</body>
</html>
