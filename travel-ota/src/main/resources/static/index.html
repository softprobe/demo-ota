<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flight Booking System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .search-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            margin-top: 50px;
        }
        
        .form-control, .form-select {
            border-radius: 10px;
            border: 2px solid #e9ecef;
            padding: 12px 15px;
            transition: all 0.3s ease;
        }
        
        .form-control:focus, .form-select:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }
        
        .btn-search {
            background: linear-gradient(45deg, #667eea, #764ba2);
            border: none;
            border-radius: 10px;
            padding: 12px 30px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .btn-search:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        
        .trip-type-btn {
            background: #f8f9fa;
            border: 2px solid #e9ecef;
            border-radius: 10px;
            padding: 10px 20px;
            margin-right: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .trip-type-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
        
        .passenger-info {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            margin-top: 10px;
        }
        
        .passenger-counter {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
        }
        
        .counter-btn {
            background: #667eea;
            color: white;
            border: none;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        
        .counter-btn:disabled {
            background: #6c757d;
            cursor: not-allowed;
        }
        .nav-header {
            padding: 20px 0;
            text-align: center;
            color: white;
        }
        
        .btn-orders {
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid white;
            color: white;
            border-radius: 10px;
            padding: 10px 25px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
            display: inline-block;
        }
        
        .btn-orders:hover {
            background: white;
            color: #667eea;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="nav-header">
        <div class="container">
            <div class="d-flex justify-content-between align-items-center">
                <h3 class="mb-0"><i class="fas fa-plane-departure"></i> Travel OTA</h3>
                <a href="/orders.html" class="btn-orders">
                    <i class="fas fa-clipboard-list"></i> Manage Orders
                </a>
            </div>
        </div>
    </div>
    
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-10">
                <div class="search-container">
                    <h2 class="text-center mb-4">
                        <i class="fas fa-plane"></i> Flight Search
                    </h2>
                    
                    <!-- Trip Type Selection -->
                    <div class="mb-4">
                        <label class="form-label fw-bold">Trip Type</label>
                        <div>
                            <button type="button" class="trip-type-btn active" data-type="ONE_WAY">
                                <i class="fas fa-arrow-right"></i> One Way
                            </button>
                            <button type="button" class="trip-type-btn" data-type="ROUND_TRIP">
                                <i class="fas fa-exchange-alt"></i> Round Trip
                            </button>
                        </div>
                    </div>
                    
                    <form id="searchForm">
                        <div class="row">
                            <!-- Departure -->
                            <div class="col-md-3 mb-3">
                                <label class="form-label fw-bold">Departure Airport</label>
                                <select class="form-select" id="fromCity" required>
                                    <option value="">Select departure airport</option>
                                    <option value="LHR">London Heathrow (LHR)</option>
                                    <option value="CDG">Paris Charles de Gaulle (CDG)</option>
                                    <option value="FRA">Frankfurt Airport (FRA)</option>
                                    <option value="AMS">Amsterdam Schiphol (AMS)</option>
                                    <option value="MAD">Madrid Barajas (MAD)</option>
                                    <option value="BCN">Barcelona Airport (BCN)</option>
                                    <option value="FCO">Rome Fiumicino (FCO)</option>
                                    <option value="MXP">Milan Malpensa (MXP)</option>
                                    <option value="ZRH">Zurich Airport (ZRH)</option>
                                    <option value="VIE">Vienna Airport (VIE)</option>
                                    <option value="CPH">Copenhagen Airport (CPH)</option>
                                    <option value="ARN">Stockholm Arlanda (ARN)</option>
                                    <option value="OSL">Oslo Airport (OSL)</option>
                                    <option value="HEL">Helsinki Airport (HEL)</option>
                                    <option value="WAW">Warsaw Airport (WAW)</option>
                                    <option value="PRG">Prague Airport (PRG)</option>
                                    <option value="BUD">Budapest Airport (BUD)</option>
                                    <option value="ATH">Athens Airport (ATH)</option>
                                    <option value="IST">Istanbul Airport (IST)</option>
                                </select>
                            </div>
                            
                            <!-- Destination -->
                            <div class="col-md-3 mb-3">
                                <label class="form-label fw-bold">Arrival Airport</label>
                                <select class="form-select" id="toCity" required>
                                    <option value="">Select arrival airport</option>
                                    <option value="LHR">London Heathrow (LHR)</option>
                                    <option value="CDG">Paris Charles de Gaulle (CDG)</option>
                                    <option value="FRA">Frankfurt Airport (FRA)</option>
                                    <option value="AMS">Amsterdam Schiphol (AMS)</option>
                                    <option value="MAD">Madrid Barajas (MAD)</option>
                                    <option value="BCN">Barcelona Airport (BCN)</option>
                                    <option value="FCO">Rome Fiumicino (FCO)</option>
                                    <option value="MXP">Milan Malpensa (MXP)</option>
                                    <option value="ZRH">Zurich Airport (ZRH)</option>
                                    <option value="VIE">Vienna Airport (VIE)</option>
                                    <option value="CPH">Copenhagen Airport (CPH)</option>
                                    <option value="ARN">Stockholm Arlanda (ARN)</option>
                                    <option value="OSL">Oslo Airport (OSL)</option>
                                    <option value="HEL">Helsinki Airport (HEL)</option>
                                    <option value="WAW">Warsaw Airport (WAW)</option>
                                    <option value="PRG">Prague Airport (PRG)</option>
                                    <option value="BUD">Budapest Airport (BUD)</option>
                                    <option value="ATH">Athens Airport (ATH)</option>
                                    <option value="IST">Istanbul Airport (IST)</option>
                                </select>
                            </div>
                            
                            <!-- Departure Date -->
                            <div class="col-md-3 mb-3">
                                <label class="form-label fw-bold">Departure Date</label>
                                <input type="date" class="form-control" id="departureDate" required>
                            </div>
                            
                            <!-- Passengers and Cabin Class -->
                            <div class="col-md-3 mb-3">
                                <label class="form-label fw-bold">Passengers & Cabin</label>
                                <div class="form-control" id="passengerInfo" style="cursor: pointer;" onclick="togglePassengerModal()">
                                    <span id="passengerSummary">1 Adult, Economy</span>
                                    <i class="fas fa-chevron-down float-end"></i>
                                </div>
                            </div>
                        </div>
                        
                        <div class="text-center mt-4">
                            <button type="submit" class="btn btn-search btn-lg text-white">
                                <i class="fas fa-search"></i> Search
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Passenger Selection Modal -->
    <div class="modal fade" id="passengerModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Passengers & Cabin Class</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="passenger-info">
                        <div class="passenger-counter">
                            <span>Adults (12+ years)</span>
                            <div>
                                <button type="button" class="counter-btn" onclick="changeCount('adults', -1)">-</button>
                                <span id="adultCount" class="mx-3">1</span>
                                <button type="button" class="counter-btn" onclick="changeCount('adults', 1)">+</button>
                            </div>
                        </div>
                        
                        <div class="passenger-counter">
                            <span>Children (2-11 years)</span>
                            <div>
                                <button type="button" class="counter-btn" onclick="changeCount('children', -1)">-</button>
                                <span id="childCount" class="mx-3">0</span>
                                <button type="button" class="counter-btn" onclick="changeCount('children', 1)">+</button>
                            </div>
                        </div>
                        
                        <div class="passenger-counter">
                            <span>Infants (under 2 years)</span>
                            <div>
                                <button type="button" class="counter-btn" onclick="changeCount('infants', -1)">-</button>
                                <span id="infantCount" class="mx-3">0</span>
                                <button type="button" class="counter-btn" onclick="changeCount('infants', 1)">+</button>
                            </div>
                        </div>
                    </div>
                    
                    <div class="mt-3">
                        <label class="form-label fw-bold">Cabin Class</label>
                        <select class="form-select" id="cabinClass">
                            <option value="ECONOMY">Economy</option>
                            <option value="PREMIUM_ECONOMY">Premium Economy</option>
                            <option value="BUSINESS">Business</option>
                            <option value="FIRST">First Class</option>
                        </select>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" onclick="confirmPassengerSelection()">Confirm</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/sessionManager.js"></script>
    <script src="js/search.js"></script>
</body>
</html>
