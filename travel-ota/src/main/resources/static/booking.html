<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Flight</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: #f8f9fa;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px 0;
        }
        
        .booking-container {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin: 20px 0;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .flight-summary {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .flight-route {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 15px 0;
        }
        
        .flight-time {
            text-align: center;
        }
        
        .flight-duration {
            text-align: center;
            color: #6c757d;
        }
        
        .flight-arrow {
            color: #667eea;
            font-size: 1.5em;
        }
        
        .passenger-form {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .btn-submit {
            background: linear-gradient(45deg, #667eea, #764ba2);
            border: none;
            border-radius: 8px;
            color: white;
            padding: 12px 30px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        
        .price-summary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .form-control, .form-select {
            border-radius: 8px;
            border: 2px solid #e9ecef;
            padding: 10px 15px;
            transition: all 0.3s ease;
        }
        
        .form-control:focus, .form-select:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }
        
        .passenger-header {
            background: #667eea;
            color: white;
            border-radius: 8px 8px 0 0;
            padding: 10px 15px;
            margin: 0 -20px 15px -20px;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <div class="container">
            <div class="row align-items-center">
                <div class="col-md-6">
                    <h4><i class="fas fa-ticket-alt"></i> Book Flight</h4>
                </div>
                <div class="col-md-6 text-end">
                    <a href="/detail.html" class="btn btn-outline-light me-2">
                        <i class="fas fa-arrow-left"></i> Back to Details
                    </a>
                    <a href="/" class="btn btn-outline-light">
                        <i class="fas fa-home"></i> Home
                    </a>
                </div>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="row">
            <!-- Left: Booking Form -->
            <div class="col-lg-8">
                <div class="booking-container">
                    <h5 class="mb-4">
                        <i class="fas fa-user"></i> Passenger Information
                    </h5>
                    
                    <!-- Flight Summary -->
                    <div class="flight-summary" id="flightSummary">
                        <!-- Flight summary will be dynamically generated by JavaScript -->
                    </div>
                    
                    <!-- Passenger Information Form -->
                    <form id="bookingForm">
                        <div id="passengerForms">
                            <!-- Passenger forms will be dynamically generated by JavaScript -->
                        </div>
                        
                        <!-- Contact Information -->
                        <div class="passenger-form">
                            <div class="passenger-header">
                                <h6 class="mb-0"><i class="fas fa-phone"></i> Contact Information</h6>
                            </div>
                            
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Phone Number *</label>
                                    <input type="tel" class="form-control" id="contactPhone" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Email Address *</label>
                                    <input type="email" class="form-control" id="contactEmail" required>
                                </div>
                            </div>
                            
                            <div class="mb-3">
                                <label class="form-label">Address</label>
                                <textarea class="form-control" id="contactAddress" rows="2"></textarea>
                            </div>
                        </div>
                        
                        <div class="text-center mt-4">
                            <button type="submit" class="btn btn-submit btn-lg">
                                <i class="fas fa-check"></i> Confirm Booking
                            </button>
                        </div>
                    </form>
                </div>
            </div>
            
            <!-- Right: Price Summary -->
            <div class="col-lg-4">
                <div class="booking-container">
                    <h5 class="mb-4">
                        <i class="fas fa-calculator"></i> Price Summary
                    </h5>
                    
                    <div class="price-summary" id="priceSummary">
                        <!-- Price summary will be dynamically generated by JavaScript -->
                    </div>
                    
                    <div class="alert alert-info">
                        <i class="fas fa-info-circle"></i>
                        <strong>Booking Notice</strong>
                        <ul class="mb-0 mt-2">
                            <li>After booking confirmation, you will receive a PNR number</li>
                            <li>Please complete payment within 24 hours</li>
                            <li>After successful payment, you will receive your ticket</li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/sessionManager.js"></script>
    <script src="js/booking.js"></script>
</body>
</html>
